name: Keep Alive

on:
  schedule:
    # Run on the 1st of every month at 8:00 AM UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Keep repo active
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last keep-alive: $(date -u '+%Y-%m-%d %H:%M UTC')" > .github/keep-alive.txt
          git add .github/keep-alive.txt
          git commit -m "chore: keep-alive ping [skip ci]"
          git push
